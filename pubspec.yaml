name: titan_ai_app
description: "Titan AI - AI Chat and License Management System."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.9.1
  file_picker: ^8.0.0        # SRT ဖိုင်ရွေးချယ်ရန်
  path_provider: ^2.1.2      # ဖိုင်သိမ်းဆည်းရန်
  http: ^1.2.2
  device_info_plus: ^12.3.0
  shared_preferences: ^2.5.4
  google_fonts: ^8.0.2
  flutter_markdown: ^0.7.7+1
  flutter_spinkit: ^5.2.2
  url_launcher: ^6.3.2
  # Syntax Highlighting အတွက် အသစ်ထည့်ရန်
  flutter_highlighter: 0.1.1
  permission_handler: ^11.3.1
  wakelock_plus: ^1.2.11
  intl: ^0.19.0
  flutter_staggered_animations: ^1.1.1
  android_id: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  change_app_package_name: ^1.1.0

flutter:
  uses-material-design: true